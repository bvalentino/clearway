name: Clearway
options:
  bundleIdPrefix: app.getclearway
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

packages:
  cmark-gfm:
    url: https://github.com/brokenhandsio/cmark-gfm.git
    from: 2.1.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  Clearway:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: app.getclearway.mac
        PRODUCT_NAME: Clearway
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_ENTITLEMENTS: Clearway.entitlements
        SPARKLE_FEED_URL: "https://bvalentino.github.io/clearway/appcast.xml"
        SPARKLE_PUBLIC_KEY: "bezL3QSG/qNJwVOEXJ8rs02NYJE0C6UZVK2M5VgaBEY="
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64"
        OTHER_LDFLAGS:
          - "-lghostty"
          - "-lz"
          - "-lc++"
          - "-framework Metal"
          - "-framework QuartzCore"
          - "-framework CoreText"
          - "-framework CoreGraphics"
          - "-framework IOSurface"
          - "-framework CoreFoundation"
          - "-framework Foundation"
          - "-framework AppKit"
          - "-framework Carbon"
        SWIFT_OBJC_BRIDGING_HEADER: ""
        CLANG_ENABLE_MODULES: YES
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application: Bruno Valentino (76AEQBHY3K)"
          DEVELOPMENT_TEAM: 76AEQBHY3K
          ENABLE_HARDENED_RUNTIME: YES
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
    postBuildScripts:
      - name: "Inject Sparkle Info.plist keys"
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)
        script: |
          set -e
          PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          if [ ! -f "$PLIST" ]; then
            echo "warning: Sparkle inject — Info.plist not found at $PLIST; skipping."
            exit 0
          fi
          plutil -replace SUFeedURL -string "$SPARKLE_FEED_URL" "$PLIST"
          plutil -replace SUPublicEDKey -string "$SPARKLE_PUBLIC_KEY" "$PLIST"
          plutil -replace SUEnableAutomaticChecks -bool YES "$PLIST"
          plutil -replace SUScheduledCheckInterval -integer 86400 "$PLIST"
      - name: "Re-sign Sparkle helpers"
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/Frameworks/Sparkle.framework
        script: |
          set -e
          if [ "$CONFIGURATION" != "Release" ]; then
            exit 0
          fi
          IDENTITY="Developer ID Application: Bruno Valentino (76AEQBHY3K)"
          FRAMEWORK="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Frameworks/Sparkle.framework"
          if [ ! -e "$FRAMEWORK" ]; then
            echo "warning: Sparkle.framework not found at $FRAMEWORK — skipping re-sign"
            exit 0
          fi
          sign_path() {
            local target="$1"
            if [ ! -e "$target" ]; then
              echo "warning: Sparkle re-sign target missing: $target"
              return 0
            fi
            echo "==> re-signing $(basename "$target")"
            /usr/bin/codesign --force --options runtime --timestamp --sign "$IDENTITY" "$target"
          }
          sign_path "$FRAMEWORK/Versions/B/XPCServices/Downloader.xpc"
          sign_path "$FRAMEWORK/Versions/B/XPCServices/Installer.xpc"
          sign_path "$FRAMEWORK/Versions/B/Updater.app"
          sign_path "$FRAMEWORK/Versions/B/Autoupdate"
          sign_path "$FRAMEWORK"
          /usr/bin/codesign --verify --deep --strict --verbose=2 "$FRAMEWORK"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --quiet
          else
            echo "warning: SwiftLint not installed — brew install swiftlint"
          fi
    preBuildScripts:
      - name: Generate BuildInfo
        script: |
          COMMIT=$(git -C "$PROJECT_DIR" rev-parse --short HEAD 2>/dev/null || echo "unknown")
          COMMIT=$(echo "$COMMIT" | tr -cd 'a-zA-Z0-9._-')
          TMPFILE=$(mktemp)
          cat > "$TMPFILE" <<SWIFT
          // Auto-generated at build time — do not edit.
          enum BuildInfo {
              static let commit = "$COMMIT"
          }
          SWIFT
          TARGET="$PROJECT_DIR/Sources/App/BuildInfo.generated.swift"
          if ! cmp -s "$TMPFILE" "$TARGET"; then
            mv "$TMPFILE" "$TARGET"
          else
            rm "$TMPFILE"
          fi
        outputFiles:
          - $(PROJECT_DIR)/Sources/App/BuildInfo.generated.swift
    dependencies:
      - package: cmark-gfm
        product: cmark
      - package: Sparkle
        product: Sparkle

  ClearwayTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.getclearway.mac.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64"
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
    dependencies:
      - target: Clearway
