name: Clearway
options:
  bundleIdPrefix: app.getclearway
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

packages:
  cmark-gfm:
    url: https://github.com/brokenhandsio/cmark-gfm.git
    from: 2.1.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  Clearway:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Resources
        optional: true
      - path: THIRD-PARTY-LICENSES
        optional: true
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: app.getclearway.mac
        PRODUCT_NAME: Clearway
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: 4
        CODE_SIGN_ENTITLEMENTS: Clearway.entitlements
        SPARKLE_FEED_URL: "https://bvalentino.github.io/clearway/appcast.xml"
        SPARKLE_PUBLIC_KEY: "bezL3QSG/qNJwVOEXJ8rs02NYJE0C6UZVK2M5VgaBEY="
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64"
        OTHER_LDFLAGS:
          - "-lghostty"
          - "-lz"
          - "-lc++"
          - "-framework Metal"
          - "-framework QuartzCore"
          - "-framework CoreText"
          - "-framework CoreGraphics"
          - "-framework IOSurface"
          - "-framework CoreFoundation"
          - "-framework Foundation"
          - "-framework AppKit"
          - "-framework Carbon"
        SWIFT_OBJC_BRIDGING_HEADER: ""
        CLANG_ENABLE_MODULES: YES
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application: Bruno Valentino (76AEQBHY3K)"
          DEVELOPMENT_TEAM: 76AEQBHY3K
          ENABLE_HARDENED_RUNTIME: YES
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
    postBuildScripts:
      - name: "Inject Sparkle Info.plist keys"
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)
        script: |
          set -e
          PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          # Fail closed on Release builds — a Release app without the Sparkle
          # plist keys would ship a silently broken updater. For Debug builds,
          # continue with a warning since the updater is not exercised there.
          if [ ! -f "$PLIST" ]; then
            if [ "$CONFIGURATION" = "Release" ]; then
              echo "error: Sparkle inject — Info.plist not found at $PLIST" >&2
              exit 1
            fi
            echo "warning: Sparkle inject — Info.plist not found at $PLIST; skipping ($CONFIGURATION build)."
            exit 0
          fi
          plutil -replace SUFeedURL -string "$SPARKLE_FEED_URL" "$PLIST"
          plutil -replace SUPublicEDKey -string "$SPARKLE_PUBLIC_KEY" "$PLIST"
          plutil -replace SUEnableAutomaticChecks -bool YES "$PLIST"
          plutil -replace SUScheduledCheckInterval -integer 86400 "$PLIST"
      - name: "Re-sign Sparkle helpers"
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/Frameworks/Sparkle.framework
        script: |
          set -e
          if [ "$CONFIGURATION" != "Release" ]; then
            exit 0
          fi
          IDENTITY="Developer ID Application: Bruno Valentino (76AEQBHY3K)"
          APP="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app"
          FRAMEWORK="$APP/Contents/Frameworks/Sparkle.framework"
          # On Release builds every step of Sparkle wiring is load-bearing, so
          # fail the build if anything is missing. Using Versions/Current keeps
          # this working if Sparkle bumps its internal framework version letter.
          if [ ! -d "$FRAMEWORK" ]; then
            echo "error: Sparkle.framework not found at $FRAMEWORK" >&2
            exit 1
          fi
          VERSIONS_CURRENT="$FRAMEWORK/Versions/Current"
          if [ ! -e "$VERSIONS_CURRENT" ]; then
            echo "error: $VERSIONS_CURRENT missing — Sparkle framework layout unexpected" >&2
            exit 1
          fi
          sign_path() {
            local target="$1"
            if [ ! -e "$target" ]; then
              echo "error: Sparkle re-sign target missing: $target" >&2
              exit 1
            fi
            echo "==> re-signing $(basename "$target")"
            /usr/bin/codesign --force --options runtime --timestamp --sign "$IDENTITY" "$target"
          }
          sign_path "$VERSIONS_CURRENT/XPCServices/Downloader.xpc"
          sign_path "$VERSIONS_CURRENT/XPCServices/Installer.xpc"
          sign_path "$VERSIONS_CURRENT/Updater.app"
          sign_path "$VERSIONS_CURRENT/Autoupdate"
          sign_path "$FRAMEWORK"
          /usr/bin/codesign --verify --deep --strict --verbose=2 "$FRAMEWORK"
          # Post-verification: confirm the Sparkle plist keys made it into the
          # final app so a silent skip in the inject phase cannot slip through.
          APP_PLIST="$APP/Contents/Info.plist"
          if [ ! -f "$APP_PLIST" ]; then
            echo "error: Info.plist missing at $APP_PLIST after build" >&2
            exit 1
          fi
          for key in SUFeedURL SUPublicEDKey SUEnableAutomaticChecks SUScheduledCheckInterval; do
            if ! /usr/bin/plutil -extract "$key" raw -o - "$APP_PLIST" >/dev/null 2>&1; then
              echo "error: $key missing from $APP_PLIST — Sparkle inject phase did not run" >&2
              exit 1
            fi
          done
      - name: "Sign and verify bundled git runtime"
        basedOnDependencyAnalysis: false
        script: |
          set -e
          GIT_DIST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Resources/git-dist"
          SRC_GIT_DIST="$PROJECT_DIR/Resources/git-dist"
          # Copy git-dist into the app bundle. The pre-build script builds it
          # into the project tree, but it's .gitignored so xcodegen never adds
          # it to "Copy Bundle Resources". We handle the copy here instead.
          if [ -d "$SRC_GIT_DIST" ]; then
            echo "==> Copying git-dist into app bundle..."
            mkdir -p "$(dirname "$GIT_DIST")"
            rsync -a --delete "$SRC_GIT_DIST/" "$GIT_DIST/"
          fi
          if [ "$CONFIGURATION" = "Release" ]; then
            if [ ! -x "$GIT_DIST/git" ]; then
              echo "error: Bundled git binary missing at $GIT_DIST/git — run ./scripts/bundle-git.sh" >&2
              exit 1
            fi
            if [ ! -x "$GIT_DIST/git-core/git-remote-https" ]; then
              echo "error: git-remote-https missing at $GIT_DIST/git-core/ — remote operations will fail" >&2
              exit 1
            fi
            IDENTITY="Developer ID Application: Bruno Valentino (76AEQBHY3K)"
            # Sign each Mach-O binary under git-dist (main binary + helpers)
            for binary in "$GIT_DIST/git" "$GIT_DIST/git-core/"*; do
              [ -f "$binary" ] || continue
              if file "$binary" | grep -q "Mach-O"; then
                echo "==> signing $(basename "$binary")"
                /usr/bin/codesign --force --options runtime --timestamp --sign "$IDENTITY" "$binary"
              fi
            done
            # Verify all signatures
            for binary in "$GIT_DIST/git" "$GIT_DIST/git-core/"*; do
              [ -f "$binary" ] || continue
              if file "$binary" | grep -q "Mach-O"; then
                /usr/bin/codesign --verify --strict --verbose=2 "$binary"
              fi
            done
          else
            if [ ! -d "$GIT_DIST" ]; then
              echo "warning: Bundled git runtime not found at $GIT_DIST (Debug build — optional)"
            fi
          fi
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --quiet
          else
            echo "warning: SwiftLint not installed — brew install swiftlint"
          fi
    preBuildScripts:
      - name: Bundle git runtime (Release)
        basedOnDependencyAnalysis: false
        script: |
          set -e
          if [ "$CONFIGURATION" != "Release" ]; then
            exit 0
          fi
          GIT_DIST="$PROJECT_DIR/Resources/git-dist"
          # Always rebuild from the pinned source for Release to guarantee
          # provenance — never reuse a stale or locally modified payload.
          if [ -d "$GIT_DIST" ]; then
            echo "==> Removing existing git-dist to rebuild from pinned source..."
            rm -rf "$GIT_DIST"
          fi
          echo "==> Building bundled git runtime for Release..."
          "$PROJECT_DIR/scripts/bundle-git.sh"
      - name: Generate BuildInfo
        script: |
          COMMIT=$(git -C "$PROJECT_DIR" rev-parse --short HEAD 2>/dev/null || echo "unknown")
          COMMIT=$(echo "$COMMIT" | tr -cd 'a-zA-Z0-9._-')
          TMPFILE=$(mktemp)
          cat > "$TMPFILE" <<SWIFT
          // Auto-generated at build time — do not edit.
          enum BuildInfo {
              static let commit = "$COMMIT"
          }
          SWIFT
          TARGET="$PROJECT_DIR/Sources/App/BuildInfo.generated.swift"
          if ! cmp -s "$TMPFILE" "$TARGET"; then
            mv "$TMPFILE" "$TARGET"
          else
            rm "$TMPFILE"
          fi
        outputFiles:
          - $(PROJECT_DIR)/Sources/App/BuildInfo.generated.swift
    dependencies:
      - package: cmark-gfm
        product: cmark
      - package: Sparkle
        product: Sparkle

  ClearwayTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.getclearway.mac.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64"
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
    dependencies:
      - target: Clearway
