name: wtpad
options:
  bundleIdPrefix: com.wtpad
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  wtpad:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.wtpad.mac
        PRODUCT_NAME: wtpad
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: 2
        CODE_SIGN_ENTITLEMENTS: wtpad.entitlements
        CODE_SIGN_IDENTITY: "-"
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64"
        OTHER_LDFLAGS:
          - "-lghostty"
          - "-lz"
          - "-lc++"
          - "-framework Metal"
          - "-framework QuartzCore"
          - "-framework CoreText"
          - "-framework CoreGraphics"
          - "-framework IOSurface"
          - "-framework CoreFoundation"
          - "-framework Foundation"
          - "-framework AppKit"
          - "-framework Carbon"
        SWIFT_OBJC_BRIDGING_HEADER: ""
        CLANG_ENABLE_MODULES: YES
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
    dependencies: []

  wtpadTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wtpad.mac.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64"
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
    dependencies:
      - target: wtpad
