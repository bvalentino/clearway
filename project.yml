name: wtpad
options:
  bundleIdPrefix: com.wtpad
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  wtpad:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.wtpad.mac
        PRODUCT_NAME: wtpad
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: 3
        CODE_SIGN_ENTITLEMENTS: wtpad.entitlements
        CODE_SIGN_IDENTITY: "-"
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64"
        OTHER_LDFLAGS:
          - "-lghostty"
          - "-lz"
          - "-lc++"
          - "-framework Metal"
          - "-framework QuartzCore"
          - "-framework CoreText"
          - "-framework CoreGraphics"
          - "-framework IOSurface"
          - "-framework CoreFoundation"
          - "-framework Foundation"
          - "-framework AppKit"
          - "-framework Carbon"
        SWIFT_OBJC_BRIDGING_HEADER: ""
        CLANG_ENABLE_MODULES: YES
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
    preBuildScripts:
      - name: Build wtpad CLI
        script: |
          if ! command -v go &>/dev/null; then
            echo "warning: Go not found — wtpad CLI will not be embedded. Install Go: brew install go"
            exit 0
          fi
          WTPAD_OUTPUT="$BUILT_PRODUCTS_DIR/$CONTENTS_FOLDER_PATH/Resources/wtpad-cli"
          # Skip rebuild if binary is newer than all Go sources
          if [ -f "$WTPAD_OUTPUT" ] && [ -z "$(find "$PROJECT_DIR/wtpad-cli" -name '*.go' -newer "$WTPAD_OUTPUT" 2>/dev/null)" ]; then
            exit 0
          fi
          mkdir -p "$(dirname "$WTPAD_OUTPUT")"
          cd "$PROJECT_DIR/wtpad-cli"
          CGO_ENABLED=0 go build -ldflags="-s -w" -o "$WTPAD_OUTPUT" .
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/wtpad-cli
      - name: Generate BuildInfo
        script: |
          COMMIT=$(git -C "$PROJECT_DIR" rev-parse --short HEAD 2>/dev/null || echo "unknown")
          COMMIT=$(echo "$COMMIT" | tr -cd 'a-zA-Z0-9._-')
          WTPAD_VERSION=$(git -C "$PROJECT_DIR/wtpad-cli" describe --tags --always 2>/dev/null || echo "unknown")
          WTPAD_VERSION=$(echo "$WTPAD_VERSION" | tr -cd 'a-zA-Z0-9._-')
          TMPFILE=$(mktemp)
          cat > "$TMPFILE" <<SWIFT
          // Auto-generated at build time — do not edit.
          enum BuildInfo {
              static let commit = "$COMMIT"
              static let wtpadVersion = "$WTPAD_VERSION"
          }
          SWIFT
          TARGET="$PROJECT_DIR/Sources/App/BuildInfo.generated.swift"
          if ! cmp -s "$TMPFILE" "$TARGET"; then
            mv "$TMPFILE" "$TARGET"
          else
            rm "$TMPFILE"
          fi
        outputFiles:
          - $(PROJECT_DIR)/Sources/App/BuildInfo.generated.swift
    dependencies: []

  wtpadTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wtpad.mac.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64"
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
    dependencies:
      - target: wtpad
